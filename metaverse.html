<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Metaverse – SimsForumRPG</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────
   TOKENS
───────────────────────────────────────────────────── */
:root {
  --bg:    #0b0b10;
  --s1:    #13131c;
  --s2:    #1a1a26;
  --s3:    #222232;
  --bdr:   rgba(255,255,255,0.08);
  --bdr2:  rgba(255,255,255,0.14);
  --acc:   #8b7fff;
  --acc2:  #4ecdc4;
  --gold:  #c8a060;
  --txt:   #ede8ff;
  --sub:   rgba(237,232,255,0.45);
  --dim:   rgba(237,232,255,0.22);
  --max:   680px;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans:  'DM Sans', system-ui, sans-serif;
}

/* ─────────────────────────────────────────────────────
   BASE
───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--txt);
  font-family: var(--sans); font-size: 15px;
  min-height: 100vh; overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button {
  font-family: inherit; background: none; border: none;
  cursor: pointer; color: var(--sub);
  transition: color .15s, transform .12s;
}
button:hover { color: var(--txt); }
button:active { transform: scale(.96); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 4px; }

/* ─────────────────────────────────────────────────────
   HEADER
───────────────────────────────────────────────────── */
.hdr {
  position: sticky; top: 0; z-index: 50;
  background: rgba(11,11,16,.92); backdrop-filter: blur(20px);
  border-bottom: 0.5px solid var(--bdr);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; height: 52px;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.hdr-logo {
  font-family: var(--serif); font-size: 18px; letter-spacing: .3px;
  color: var(--txt);
}
.hdr-logo span { color: var(--acc); }
.hdr-tag {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); border: 0.5px solid var(--bdr); border-radius: 3px;
  padding: 2px 7px;
}
.hdr-right { display: flex; align-items: center; gap: 4px; }
.hdr-btn {
  padding: 6px 8px; border-radius: 7px; font-size: 11px;
  color: var(--sub); letter-spacing: .3px;
  transition: background .14s, color .14s;
}
.hdr-btn:hover { background: var(--s2); color: var(--txt); }
.hdr-btn.active { color: var(--acc); }

/* ─────────────────────────────────────────────────────
   PAGE LAYOUT
───────────────────────────────────────────────────── */
.page { max-width: var(--max); margin: 0 auto; padding: 0 20px 80px; }

/* ─────────────────────────────────────────────────────
   HERO  (nur in Feed-View)
───────────────────────────────────────────────────── */
.hero {
  padding: 40px 0 32px;
  border-bottom: 0.5px solid var(--bdr);
  margin-bottom: 36px;
}
.hero-eyebrow {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--acc); margin-bottom: 12px;
}
.hero-title {
  font-family: var(--serif); font-size: 36px; font-weight: 400;
  line-height: 1.15; color: var(--txt); margin-bottom: 12px;
}
.hero-sub {
  font-size: 14px; color: var(--sub); line-height: 1.7; max-width: 460px;
}

/* ─────────────────────────────────────────────────────
   SERIES STRIP
───────────────────────────────────────────────────── */
.series-strip {
  display: flex; gap: 8px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 4px;
  margin-bottom: 32px;
}
.series-strip::-webkit-scrollbar { display: none; }
.series-pill {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  font-size: 12px; letter-spacing: .2px;
  background: var(--s2); border: 0.5px solid var(--bdr);
  color: var(--sub); cursor: pointer;
  transition: background .14s, border-color .14s, color .14s;
  white-space: nowrap;
}
.series-pill:hover { background: var(--s3); color: var(--txt); }
.series-pill.active { background: var(--acc); border-color: var(--acc); color: #fff; }

/* ─────────────────────────────────────────────────────
   SECTION LABEL
───────────────────────────────────────────────────── */
.sec-label {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 16px;
}

/* ─────────────────────────────────────────────────────
   POST CARDS  –  Magazine Stack
───────────────────────────────────────────────────── */
.feed { display: flex; flex-direction: column; gap: 0; }

.post-card {
  display: grid; grid-template-columns: 1fr auto;
  gap: 0 18px; padding: 20px 0;
  border-bottom: 0.5px solid var(--bdr);
  cursor: pointer;
  transition: background .12s;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.post-card:nth-child(1){animation-delay:.04s}
.post-card:nth-child(2){animation-delay:.08s}
.post-card:nth-child(3){animation-delay:.12s}
.post-card:nth-child(4){animation-delay:.16s}
.post-card:nth-child(5){animation-delay:.20s}

.post-card:hover { background: rgba(255,255,255,.02); margin: 0 -20px; padding-left: 20px; padding-right: 20px; }

.pc-main { display: flex; flex-direction: column; gap: 6px; min-width: 0; }

.pc-series {
  font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--acc); font-weight: 500;
}
.pc-title {
  font-family: var(--serif); font-size: 19px; font-weight: 400;
  line-height: 1.3; color: var(--txt);
}
.pc-excerpt {
  font-size: 13px; color: var(--sub); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.pc-meta {
  display: flex; align-items: center; gap: 10px; margin-top: 4px;
}
.pc-av {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--s3); overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; flex-shrink: 0;
}
.pc-av img { width: 100%; height: 100%; object-fit: cover; }
.pc-author { font-size: 12px; color: var(--sub); font-weight: 500; }
.pc-dot { font-size: 10px; color: var(--dim); }
.pc-date { font-size: 12px; color: var(--dim); }
.pc-cmts { font-size: 11px; color: var(--dim); }

.pc-img {
  width: 80px; height: 80px; flex-shrink: 0;
  background: var(--s2); border-radius: 6px; overflow: hidden;
  align-self: center;
}
.pc-img img { width: 100%; height: 100%; object-fit: cover; }

/* Featured card (first post) */
.post-card.featured {
  grid-template-columns: 1fr;
  padding-bottom: 24px; margin-bottom: 8px;
}
.post-card.featured .pc-img {
  width: 100%; height: 220px; border-radius: 8px;
  margin-bottom: 14px; order: -1;
}
.post-card.featured .pc-title { font-size: 26px; }
.post-card.featured .pc-excerpt { -webkit-line-clamp: 3; }

/* ─────────────────────────────────────────────────────
   SPINNER / STATUS
───────────────────────────────────────────────────── */
.status {
  display: flex; flex-direction: column; align-items: center;
  gap: 14px; padding: 64px 20px; color: var(--sub); text-align: center;
  font-size: 14px;
}
.spin {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--s3); border-top-color: var(--acc);
  animation: sp .7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }

/* ─────────────────────────────────────────────────────
   PAGER
───────────────────────────────────────────────────── */
.pager {
  display: flex; gap: 6px; justify-content: center;
  padding: 32px 0 12px; flex-wrap: wrap;
}
.pager button {
  padding: 7px 14px; border-radius: 7px; font-size: 13px;
  background: var(--s2); border: 0.5px solid var(--bdr);
  color: var(--sub);
  transition: background .12s, border-color .12s, color .12s;
}
.pager button:hover { background: var(--s3); color: var(--txt); }
.pager button.cur { background: var(--acc); border-color: var(--acc); color: #fff; }

/* ─────────────────────────────────────────────────────
   POST DETAIL MODAL
───────────────────────────────────────────────────── */
.ov {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.85); backdrop-filter: blur(10px);
  overflow-y: auto;
}
.ov.open { display: block; }

.pm {
  max-width: 660px; margin: 40px auto 80px;
  background: var(--s1);
  border: 0.5px solid var(--bdr2);
  border-radius: 14px; overflow: hidden;
  animation: zoomIn .2s ease;
}
@keyframes zoomIn { from { opacity:0; transform:translateY(12px) scale(.98); } to { opacity:1; transform:none; } }

@media (max-width: 680px) {
  .pm { margin: 0; border-radius: 0; min-height: 100vh; }
  .ov { overflow-y: auto; }
}

.pm-close-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 0.5px solid var(--bdr);
  position: sticky; top: 0; background: var(--s1); z-index: 10;
}
.pm-close-btn {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--sub); padding: 4px 0;
}
.pm-close-btn:hover { color: var(--txt); }
.pm-series-tag {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--acc); font-weight: 500;
}

.pm-hero { width: 100%; aspect-ratio: 16/9; background: var(--s2); overflow: hidden; }
.pm-hero img { width: 100%; height: 100%; object-fit: cover; }

.pm-body { padding: 28px 28px 20px; }

.pm-title {
  font-family: var(--serif); font-size: 28px; font-weight: 400;
  line-height: 1.25; color: var(--txt); margin-bottom: 14px;
}
.pm-meta {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 20px; border-bottom: 0.5px solid var(--bdr);
  margin-bottom: 24px;
}
.pm-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--s3); overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.pm-av img { width: 100%; height: 100%; object-fit: cover; }
.pm-author { font-size: 13px; font-weight: 500; color: var(--sub); }
.pm-date { font-size: 12px; color: var(--dim); }

.pm-content {
  font-size: 15px; line-height: 1.8; color: rgba(237,232,255,.8);
  white-space: pre-wrap; font-family: var(--sans);
}

.pm-forum-link {
  display: inline-flex; align-items: center; gap: 6px;
  margin-top: 28px; padding: 9px 16px;
  background: var(--s2); border: 0.5px solid var(--bdr);
  border-radius: 8px; font-size: 13px; color: var(--sub);
  transition: background .14s, border-color .14s, color .14s;
}
.pm-forum-link:hover { background: var(--s3); border-color: var(--bdr2); color: var(--txt); }

/* comments */
.pm-cmts-section { padding: 20px 28px 28px; border-top: 0.5px solid var(--bdr); }
.pm-cmts-hd {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.pm-cmts-hd button { font-size: 11px; color: var(--acc); padding: 2px 0; }
.cmt { display: flex; gap: 10px; margin-bottom: 16px; }
.cmt-av {
  width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
  background: var(--s3); overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 11px;
}
.cmt-av img { width: 100%; height: 100%; object-fit: cover; }
.cmt-body { font-size: 13px; line-height: 1.55; }
.cmt-body .cmt-author { font-weight: 500; color: var(--sub); margin-right: 5px; }
.cmt-body .cmt-time { font-size: 11px; color: var(--dim); display: block; margin-bottom: 3px; }
.cmt-body .cmt-text { color: rgba(237,232,255,.75); white-space: pre-wrap; }

/* comment input */
.pm-cmt-bar {
  display: flex; gap: 8px; align-items: flex-end;
  padding: 0 28px 20px;
}
.pm-cmt-in {
  flex: 1; background: var(--s2); border: 0.5px solid var(--bdr);
  border-radius: 10px; padding: 9px 13px;
  color: var(--txt); font-family: var(--sans); font-size: 13px;
  outline: none; resize: none; max-height: 80px; line-height: 1.45;
  transition: border-color .16s;
}
.pm-cmt-in:focus { border-color: var(--acc); }
.pm-cmt-in::placeholder { color: var(--dim); }
.pm-cmt-send {
  background: var(--acc) !important; color: #fff !important;
  border-radius: 8px; width: 36px; height: 36px; min-width: 36px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity .15s !important;
}
.pm-cmt-send:hover { opacity: .85; transform: none !important; }

/* ─────────────────────────────────────────────────────
   POPUP WAIT
───────────────────────────────────────────────────── */
.pw {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.9); backdrop-filter: blur(12px);
  align-items: center; justify-content: center; flex-direction: column; gap: 16px;
}
.pw.open { display: flex; }
.pw p { color: var(--sub); font-size: 14px; text-align: center;
  max-width: 280px; line-height: 1.6; }
.pw strong { color: var(--txt); }
.pw-cancel { color: var(--dim) !important; font-size: 12px; margin-top: 4px; }
.pw-cancel:hover { color: #ff5e7d !important; }

/* ─────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--s2); border: 0.5px solid var(--bdr);
  padding: 9px 18px; border-radius: 20px; font-size: 12px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
  white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; }
.toast.ok { border-color: var(--acc2); color: var(--acc2); }
.toast.err { border-color: #ff5e7d; color: #ff5e7d; }
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-left">
    <span class="hdr-logo">Meta<span>verse</span></span>
    <span class="hdr-tag">SimsForumRPG</span>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="window.open('https://www.simsforumrpg.de/blog-c1375-Metaverse.html','_blank')">Im Forum</button>
    <button class="hdr-btn" onclick="loadFeed(true)" title="Neu laden">↺</button>
  </div>
</header>

<!-- MAIN -->
<div class="page">

  <!-- Hero -->
  <div class="hero" id="hero">
    <div class="hero-eyebrow">Das Universum ausserhalb SimsWelt</div>
    <h1 class="hero-title">Metaverse</h1>
    <p class="hero-sub">Hinter den Pixeln, echte Gespräche, Interviews und alles was ausserhalb der SimsWelt-Geschichte lebt.</p>
  </div>

  <!-- Series filter -->
  <div class="series-strip" id="series-strip">
    <button class="series-pill active" onclick="filterSeries(null, this)">Alle</button>
    <button class="series-pill" onclick="filterSeries('hinter-den-pixeln', this)">Hinter den Pixeln</button>
    <button class="series-pill" onclick="filterSeries('wir-sprechen-klartext', this)">Wir sprechen Klartext</button>
    <button class="series-pill" onclick="filterSeries('nael-spatz', this)">Nael & Spatz</button>
    <button class="series-pill" onclick="filterSeries('', this)">Sonstige</button>
  </div>

  <!-- Feed -->
  <div id="feed">
    <div class="status"><div class="spin"></div><span>Posts werden geladen…</span></div>
  </div>
</div>

<!-- POST DETAIL MODAL -->
<div class="ov" id="pm-ov" onclick="if(event.target===this)closePM()">
  <div class="pm">
    <div class="pm-close-bar">
      <button class="pm-close-btn" onclick="closePM()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Zurück
      </button>
      <span class="pm-series-tag" id="pm-series-tag"></span>
    </div>
    <div class="pm-hero" id="pm-hero" style="display:none">
      <img id="pm-hero-img" src="" alt="">
    </div>
    <div class="pm-body">
      <h2 class="pm-title" id="pm-title"></h2>
      <div class="pm-meta">
        <div class="pm-av" id="pm-av"></div>
        <span class="pm-author" id="pm-author"></span>
        <span class="pm-date" id="pm-date"></span>
      </div>
      <div class="pm-content" id="pm-content">Wird geladen…</div>
      <a class="pm-forum-link" id="pm-forum-link" href="#" target="_blank">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Im Forum öffnen
      </a>
    </div>
    <div class="pm-cmts-section">
      <div class="pm-cmts-hd">
        <span>Kommentare</span>
        <button onclick="refreshCmts()">↺ Aktualisieren</button>
      </div>
      <div id="pm-cmts"><span style="color:var(--dim);font-size:12px">Lade…</span></div>
    </div>
    <div class="pm-cmt-bar">
      <textarea class="pm-cmt-in" id="cmtIn" rows="1" placeholder="Kommentar schreiben…"
        oninput="autoH(this)"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();openCommentPopup()}"></textarea>
      <button class="pm-cmt-send" onclick="openCommentPopup()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- POPUP WAIT -->
<div class="pw" id="pw">
  <div class="spin"></div>
  <p id="pw-txt">Warte auf Xobor-Fenster…</p>
  <button class="pw-cancel" onclick="cancelPopupWait()">Abbrechen</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG  –  hier die URL deines deployten Apps Scripts eintragen
// ══════════════════════════════════════════════════════
const APPSSCRIPT = 'https://script.google.com/macros/s/AKfycbxqLQvuPPdcu4zoLakqtRzKjx7Z2FUf69lwqhzmvoiKuIXMCtXVZHCGfKGFkVLW2JScOw/exec';
const XOBOR      = 'https://www.simsforumrpg.de';

const SERIES_LABELS = {
  'hinter-den-pixeln':     'Hinter den Pixeln',
  'wir-sprechen-klartext': 'Wir sprechen Klartext',
  'nael-spatz':            'Nael & Spatz',
  'simswelt-news-alt':     'SimsWelt News (Archiv)',
};

const EMOJIS = ['🌙','✨','🌊','🎮','🦋','🌸','⚡','🎭','🍀','💫','🦄','🌈','⭐','🎪','🌻','🔮'];

// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
let allPosts  = [];
let filtered  = [];
let curFilter = null;
const PER  = 8;
let page   = 0;
let curPost = null;
let xPopup  = null;
let pwTimer = null;

// ══════════════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════════════
async function loadFeed(spinner = true) {
  if (spinner) $('feed').innerHTML = '<div class="status"><div class="spin"></div><span>Posts werden geladen…</span></div>';
  try {
    const res  = await fetch(APPSSCRIPT + '?action=feed');
    const raw  = await res.text();
    let data;
    try { data = JSON.parse(raw); }
    catch(e) { throw new Error('Apps Script gibt kein gültiges JSON zurück.'); }
    allPosts = Array.isArray(data) ? data : (data.posts || data.items || []);
    if (!allPosts.length) throw new Error('Keine Posts gefunden.');
    page = 0; curFilter = null;
    filtered = [...allPosts];
    buildFeed();
  } catch(e) {
    $('feed').innerHTML = `<div class="status">
      <span style="max-width:300px;color:var(--sub)">${e.message}</span>
      <a href="${XOBOR}/blog-c1375-Metaverse.html" target="_blank"
         style="color:var(--acc);font-size:13px">Direkt im Forum öffnen →</a>
    </div>`;
  }
}

// ══════════════════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════════════════
function filterSeries(id, btn) {
  document.querySelectorAll('.series-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  curFilter = id;
  page = 0;

  if (id === null) {
    filtered = [...allPosts];
  } else if (id === '') {
    filtered = allPosts.filter(p => !p.series);
  } else {
    filtered = allPosts.filter(p => p.series === id);
  }
  buildFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  BUILD FEED
// ══════════════════════════════════════════════════════
function buildFeed() {
  const start = page * PER;
  const slice = filtered.slice(start, start + PER);
  const total = Math.ceil(filtered.length / PER);

  if (!slice.length) {
    $('feed').innerHTML = '<div class="status"><span>Keine Posts in dieser Serie.</span></div>';
    return;
  }

  const cards = slice.map((p, i) => buildCard(p, start + i, i === 0 && page === 0 && curFilter === null)).join('');
  const pager = total > 1 ? buildPager(total) : '';
  $('feed').innerHTML = cards + pager;
}

function buildCard(p, idx, featured) {
  const title  = G(p,'title'), author = G(p,'author'), date = G(p,'date');
  const exc    = G(p,'content'), img = G(p,'image'), ava = G(p,'avatar');
  const cmts   = parseInt(G(p,'comments') || 0, 10);
  const series = p.series ? (SERIES_LABELS[p.series] || '') : '';
  const short  = exc.length > 140 ? exc.slice(0,140) + '…' : exc;

  const imgHtml = img ? `<div class="pc-img"><img src="${X(img)}" alt="${X(title)}" loading="lazy" onerror="this.closest('.pc-img').style.display='none'"></div>` : '';
  const metaHtml = `<div class="pc-meta">
    <div class="pc-av">${ava ? `<img src="${X(ava)}" onerror="this.outerHTML='${IC(author)}'">` : IC(author)}</div>
    <span class="pc-author">${X(author)}</span>
    ${date ? `<span class="pc-dot">·</span><span class="pc-date">${X(date)}</span>` : ''}
    ${cmts > 0 ? `<span class="pc-dot">·</span><span class="pc-cmts">${cmts} Komm.</span>` : ''}
  </div>`;

  if (featured && img) {
    return `<article class="post-card featured" onclick="openPost(${idx})">
      <div class="pc-img" style="width:100%;height:220px;border-radius:8px;margin-bottom:14px">
        <img src="${X(img)}" alt="${X(title)}" loading="lazy" style="width:100%;height:100%;object-fit:cover" onerror="this.closest('.pc-img').style.display='none'">
      </div>
      <div class="pc-main">
        ${series ? `<div class="pc-series">${X(series)}</div>` : ''}
        <div class="pc-title">${X(title)}</div>
        ${exc ? `<div class="pc-excerpt">${X(short)}</div>` : ''}
        ${metaHtml}
      </div>
    </article>`;
  }

  return `<article class="post-card" onclick="openPost(${idx})">
    <div class="pc-main">
      ${series ? `<div class="pc-series">${X(series)}</div>` : ''}
      <div class="pc-title">${X(title)}</div>
      ${exc ? `<div class="pc-excerpt">${X(short)}</div>` : ''}
      ${metaHtml}
    </div>
    ${imgHtml}
  </article>`;
}

function buildPager(total) {
  const btns = Array.from({length: total}, (_,i) =>
    `<button class="${i===page?'cur':''}" onclick="goPage(${i})">${i+1}</button>`
  ).join('');
  return `<div class="pager">${btns}</div>`;
}

function goPage(p) {
  page = p;
  buildFeed();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════════════════
//  POST MODAL
// ══════════════════════════════════════════════════════
async function openPost(idx) {
  const p = filtered[idx]; if (!p) return;
  curPost = { p, idx, url: G(p,'url') };

  const img = G(p,'image'), title = G(p,'title');
  const auth = G(p,'author'), date = G(p,'date'), ava = G(p,'avatar');
  const cont = G(p,'content'), series = p.series;
  const url  = G(p,'url');

  // Series tag
  $('pm-series-tag').textContent = series ? (SERIES_LABELS[series] || '') : '';

  // Hero image
  if (img) { $('pm-hero').style.display=''; $('pm-hero-img').src=img; }
  else $('pm-hero').style.display='none';

  $('pm-title').textContent    = title;
  $('pm-av').innerHTML         = ava ? `<img src="${X(ava)}" onerror="this.outerHTML='${IC(auth)}'">` : IC(auth);
  $('pm-author').textContent   = auth;
  $('pm-date').textContent     = date;
  $('pm-content').textContent  = cont || 'Lade Inhalt…';
  $('pm-forum-link').href      = url || '#';
  $('pm-cmts').innerHTML       = '<span style="color:var(--dim);font-size:12px">Lade Kommentare…</span>';

  $('pm-ov').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Vollständigen Text nachladen
  if (url) {
    fetch(`${APPSSCRIPT}?action=post&url=${encodeURIComponent(url)}`)
      .then(r => r.json())
      .then(d => {
        if (d.content) $('pm-content').textContent = d.content;
        if (d.image && !img) { $('pm-hero-img').src = d.image; $('pm-hero').style.display = ''; }
      }).catch(() => {});
    fetchComments(url);
  }
}

async function fetchComments(url) {
  const div = $('pm-cmts');
  try {
    const r = await fetch(`${APPSSCRIPT}?action=comments&url=${encodeURIComponent(url)}`);
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!d.comments?.length) {
      div.innerHTML = '<span style="color:var(--dim);font-size:12px">Noch keine Kommentare.</span>';
      return;
    }
    div.innerHTML = d.comments.map(c => {
      const av = c.avatar
        ? `<img src="${X(c.avatar)}" onerror="this.outerHTML='${IC(c.author||'?')}'" style="width:100%;height:100%;object-fit:cover">`
        : IC(c.author||'?');
      return `<div class="cmt">
        <div class="cmt-av">${av}</div>
        <div class="cmt-body">
          ${c.time ? `<span class="cmt-time">${X(c.time)}</span>` : ''}
          <span class="cmt-author">${X(c.author)}</span>
          <span class="cmt-text">${X(c.text)}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    div.innerHTML = `<span style="color:var(--dim);font-size:12px">
      Kommentare nicht geladen.
      <a href="${X(url)}#com" target="_blank" style="color:var(--acc);display:block;margin-top:4px">Auf Xobor kommentieren →</a>
    </span>`;
  }
}

function refreshCmts() {
  if (curPost?.url) {
    $('pm-cmts').innerHTML = '<span style="color:var(--dim);font-size:12px">Lade…</span>';
    fetchComments(curPost.url);
  }
}

function closePM() {
  $('pm-ov').classList.remove('open');
  document.body.style.overflow = '';
  curPost = null;
}

// ══════════════════════════════════════════════════════
//  COMMENT via Xobor Popup
// ══════════════════════════════════════════════════════
function openCommentPopup() {
  if (!curPost?.url) return;
  const text = $('cmtIn').value.trim();
  const url  = curPost.url + '#com';
  if (text && navigator.clipboard) {
    navigator.clipboard.writeText(text)
      .then(() => toast('📋 Kommentar kopiert — Ctrl+V im Fenster', 'ok'))
      .catch(() => {});
  }
  const w = 560, h = 500;
  const left = Math.min(screen.width - w - 10, window.screenX + window.outerWidth + 10);
  const top  = Math.max(10, window.screenY + 80);
  xPopup = window.open(url, 'xobor-comment', `width=${w},height=${h},left=${left},top=${top},scrollbars=yes,resizable=yes`);
  clearInterval(pwTimer);
  pwTimer = setInterval(() => {
    if (!xPopup || xPopup.closed) {
      clearInterval(pwTimer); xPopup = null;
      $('cmtIn').value = ''; autoH($('cmtIn'));
      setTimeout(() => refreshCmts(), 800);
      toast('Kommentare aktualisiert ✓', 'ok');
    }
  }, 900);
}

function cancelPopupWait() {
  clearInterval(pwTimer);
  $('pw').classList.remove('open');
  if (xPopup && !xPopup.closed) xPopup.close();
  xPopup = null;
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
const ALIASES = {
  title:    ['title','subject','betreff','headline'],
  author:   ['author','user','username','autor'],
  date:     ['date','created','datum','time','timestamp'],
  content:  ['content','text','body','message','summary','excerpt','inhalt'],
  image:    ['image','img','imageUrl','image_url','thumbnail','bild','picture'],
  avatar:   ['avatar','avatarUrl','avatar_url','profilePic','userAvatar'],
  url:      ['url','link','href','postUrl','blogUrl'],
  comments: ['comments','commentCount','comment_count','kommentare'],
};
function G(obj, field) {
  for (const k of (ALIASES[field] || [field])) {
    if (obj[k] != null && obj[k] !== '') return String(obj[k]);
  }
  return '';
}
function IC(name) {
  const i = [...(name||'')].reduce((a,c) => a + c.charCodeAt(0), 0) % EMOJIS.length;
  return `<span style="font-size:12px">${EMOJIS[i]}</span>`;
}
function X(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function $(id) { return document.getElementById(id); }
function autoH(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
let _tt;
function toast(msg, type='') {
  const el = $('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePM(); });

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
loadFeed();
</script>
